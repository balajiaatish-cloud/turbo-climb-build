<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Hill Climb Racer</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
            font-family: monospace;
        }
        #log {
            background: #0a0a1a;
            padding: 15px;
            border-radius: 5px;
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #444;
        }
        .log-entry {
            padding: 5px;
            margin: 3px 0;
            border-left: 3px solid #00ff00;
            padding-left: 10px;
        }
        .error {
            border-left-color: #ff3333;
            color: #ff6666;
        }
        .info {
            border-left-color: #3366ff;
            color: #99ccff;
        }
        h1 {
            color: #4af;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px 5px 0 0;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <h1>🎮 Hill Climb Racer - Debug Console</h1>
    <button onclick="clearLog()">Clear Log</button>
    <button onclick="testPhaser()">Test Phaser Load</button>
    <button onclick="testGraphics()">Test Graphics</button>
    <button onclick="location.href='index.html'">Open Game</button>
    
    <div id="log"></div>

    <script>
        function addLog(message, isError = false) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (isError ? ' error' : ' info');
            entry.textContent = '[' + new Date().toLocaleTimeString() + '] ' + message;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            addLog('Log cleared');
        }

        function testPhaser() {
            addLog('Testing Phaser...');
            if (typeof Phaser !== 'undefined') {
                addLog('✓ Phaser loaded successfully');
                addLog('Phaser version: ' + Phaser.VERSION);
            } else {
                addLog('✗ Phaser NOT loaded', true);
            }
        }

        function testGraphics() {
            addLog('Testing graphics generation...');
            try {
                if (typeof GameGraphics === 'undefined') {
                    addLog('✗ GameGraphics class not found', true);
                    return;
                }
                addLog('✓ GameGraphics class found');

                // Load Phaser if we can
                if (typeof Phaser === 'undefined') {
                    addLog('✗ Phaser not loaded yet', true);
                    return;
                }
                addLog('✓ Phaser available');
            } catch (e) {
                addLog('✗ Error: ' + e.message, true);
            }
        }

        // Log initial state
        window.addEventListener('load', function() {
            addLog('Page loaded');
            addLog('Window.location: ' + window.location.href);
            
            if (typeof Phaser !== 'undefined') {
                addLog('✓ Phaser CDN loaded');
            } else {
                addLog('⏳ Waiting for Phaser CDN...');
                setTimeout(function() {
                    if (typeof Phaser !== 'undefined') {
                        addLog('✓ Phaser CDN loaded (delayed)');
                    } else {
                        addLog('✗ Phaser CDN FAILED to load', true);
                    }
                }, 3000);
            }
        });

        // Add console override
        const originalLog = console.log;
        const originalError = console.error;
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog('LOG: ' + args.join(' '));
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            addLog('ERROR: ' + args.join(' '), true);
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <script src="js/preload.js"></script>
    <script src="js/graphics.js"></script>
    <script src="js/gameconfig.js"></script>
</body>
</html>
