<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hill Climb Racer - Simple Test</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #gameContainer {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="gameContainer"></div>

    <script>
        // Simple game state
        const gameState = {
            coins: 0,
            diamonds: 0,
            distance: 0,
            health: 100
        };

        // Simple test config
        const config = {
            type: Phaser.AUTO,
            parent: 'gameContainer',
            width: 800,
            height: 600,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 300 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        function preload() {
            console.log('Preload started');
        }

        function create() {
            console.log('Create started');
            
            try {
                // Add background
                this.add.rectangle(400, 300, 800, 600, 0x87CEEB);

                // Add title text
                this.add.text(400, 50, 'TESTING GAME', {
                    fontSize: '32px',
                    fill: '#ffffff',
                    fontStyle: 'bold'
                }).setOrigin(0.5);

                // Add player (simple rectangle)
                this.player = this.physics.add.rectangle(400, 400, 40, 20, 0xff3333);
                this.player.setBounce(0.2);
                this.player.setCollideWorldBounds(true);

                // Add a platform
                this.platform = this.physics.add.staticGroup();
                this.platform.create(400, 500, null).setScale(4).refreshBody();

                // Add a coin sprite (simple circle)
                this.coins = this.physics.add.group();
                for (let i = 0; i < 5; i++) {
                    const coin = this.coins.create(Math.random() * 800, Math.random() * 300, null);
                    coin.setTint(0xFF感DEO);
                }

                // Collision
                this.physics.add.collider(this.player, this.platform);
                this.physics.add.overlap(this.player, this.coins, collectCoin, null, this);

                // Input
                this.cursors = this.input.keyboard.createCursorKeys();

                // Instructions
                this.add.text(400, 250, 'If you see this, the game is working!', {
                    fontSize: '20px',
                    fill: '#ffff00'
                }).setOrigin(0.5);

                console.log('Create completed successfully!');
            } catch (e) {
                console.error('Error in create:', e);
                alert('Error: ' + e.message);
            }
        }

        function update() {
            if (this.cursors.left.isDown) {
                this.player.setVelocityX(-200);
            } else if (this.cursors.right.isDown) {
                this.player.setVelocityX(200);
            }

            if (this.cursors.up.isDown && this.player.body.touching.down) {
                this.player.setVelocityY(-300);
            }
        }

        function collectCoin(player, coin) {
            console.log('Coin collected!');
            coin.destroy();
        }
    </script>
</body>
</html>
