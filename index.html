<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#04111d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hill Climb Racer">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <title>Hill Climb Racer Turbo</title>
    <script defer src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <script defer src="js/graphics.js"></script>
    <script defer src="js/gameconfig.js"></script>
    <script defer src="js/audio.js"></script>
    <script defer src="js/scenes/preloadscene.js"></script>
    <script defer src="js/scenes/titlescene.js"></script>
    <script defer src="js/scenes/shopscene.js"></script>
    <script defer src="js/scenes/mapscene.js"></script>
    <script defer src="js/scenes/rewardscene.js"></script>
    <script defer src="js/scenes/goalsscene.js"></script>
    <script defer src="js/scenes/gamescene.js"></script>
    <script defer src="js/scenes/gameoverscene.js"></script>
    <script defer src="js/main.js"></script>
    <script defer src="js/pwa.js"></script>
    <style>
        :root {
            --page-bg-1: #04111d;
            --page-bg-2: #13263b;
            --page-bg-3: #f7b801;
            --panel-border: rgba(255, 255, 255, 0.14);
            --panel-glow: rgba(247, 184, 1, 0.28);
            --text-soft: #c7d8ef;
            --shell-pad: clamp(10px, 1.8vw, 22px);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            min-height: 100%;
        }

        body {
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
            font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
            color: #f8fbff;
            background:
                radial-gradient(circle at top right, rgba(247, 184, 1, 0.25), transparent 22%),
                radial-gradient(circle at left center, rgba(75, 214, 109, 0.16), transparent 24%),
                linear-gradient(165deg, var(--page-bg-1), var(--page-bg-2) 55%, #0c1d2f);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto auto 10% -8%;
            width: 28vw;
            height: 28vw;
            min-width: 240px;
            min-height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08), transparent 65%);
            filter: blur(6px);
            pointer-events: none;
        }

        body::after {
            inset: 4% -10% auto auto;
            background: radial-gradient(circle, rgba(247, 184, 1, 0.14), transparent 68%);
        }

        #app-shell {
            position: relative;
            width: 100vw;
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            padding:
                calc(var(--shell-pad) + env(safe-area-inset-top))
                calc(var(--shell-pad) + env(safe-area-inset-right))
                calc(var(--shell-pad) + env(safe-area-inset-bottom))
                calc(var(--shell-pad) + env(safe-area-inset-left));
        }

        #game-frame {
            position: relative;
            width: min(calc(100vw - (var(--shell-pad) * 2)), calc((100dvh - (var(--shell-pad) * 2)) * 16 / 9));
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            box-shadow:
                0 24px 70px rgba(0, 0, 0, 0.42),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                0 0 36px var(--panel-glow);
            background: rgba(6, 16, 29, 0.78);
            backdrop-filter: blur(10px);
        }

        #game-container {
            width: 100%;
            height: 100%;
        }

        #game-container canvas {
            touch-action: none;
        }

        .frame-chrome {
            position: absolute;
            inset: 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }

        .top-banner,
        .bottom-banner {
            position: absolute;
            left: 24px;
            z-index: 2;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(4, 12, 22, 0.52);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-soft);
            letter-spacing: 0.02em;
            pointer-events: none;
        }

        .top-banner {
            top: 20px;
            font-size: 13px;
            text-transform: uppercase;
        }

        .bottom-banner {
            bottom: 20px;
            font-size: 14px;
        }

        .install-chip {
            position: absolute;
            top: 20px;
            right: 24px;
            z-index: 3;
            display: none;
            align-items: center;
            gap: 10px;
            max-width: min(320px, calc(100% - 48px));
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(4, 12, 22, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
        }

        .install-chip.is-visible {
            display: inline-flex;
        }

        .install-chip button {
            border: 0;
            border-radius: 999px;
            padding: 9px 14px;
            background: #ffb703;
            color: #08111f;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .install-chip button:hover {
            filter: brightness(1.04);
        }

        .install-chip span {
            color: var(--text-soft);
            font-size: 13px;
            line-height: 1.3;
        }

        #rotate-overlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 28px;
            text-align: center;
            background: rgba(4, 12, 22, 0.86);
            backdrop-filter: blur(10px);
            z-index: 5;
        }

        #rotate-overlay strong {
            display: block;
            margin-bottom: 10px;
            font-size: 26px;
            color: #ffd166;
            letter-spacing: 0.03em;
        }

        #rotate-overlay span {
            display: block;
            max-width: 320px;
            margin: 0 auto;
            color: #d7e3f4;
            line-height: 1.5;
            font-size: 16px;
        }

        @media (max-width: 720px) {
            #app-shell {
                padding:
                    env(safe-area-inset-top)
                    env(safe-area-inset-right)
                    env(safe-area-inset-bottom)
                    env(safe-area-inset-left);
            }

            #game-frame {
                border-radius: 0;
                border: 0;
                width: 100vw;
            }

            .frame-chrome {
                display: none;
            }

            .top-banner,
            .bottom-banner {
                left: 12px;
                right: 12px;
                border-radius: 16px;
                font-size: 12px;
            }

            .install-chip {
                top: auto;
                right: 12px;
                bottom: 58px;
                left: 12px;
                max-width: none;
                border-radius: 18px;
            }
        }

        @media (max-width: 900px) and (orientation: portrait) {
            .top-banner,
            .bottom-banner,
            .install-chip {
                display: none;
            }

            #rotate-overlay {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="app-shell">
        <div id="game-frame">
            <div id="game-container"></div>
            <div class="frame-chrome"></div>
            <div class="top-banner">Turbo climb build</div>
            <div class="bottom-banner">Steer, boost, collect, and stay above the fall line.</div>
            <div class="install-chip" id="install-chip">
                <button id="install-app-button" type="button">Install</button>
                <span id="install-app-text">Install on this device for quick launch.</span>
            </div>
            <div id="rotate-overlay">
                <div>
                    <strong>Rotate To Landscape</strong>
                    <span>The game plays best on phones in landscape mode, with larger controls and a clearer view of the climb.</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
